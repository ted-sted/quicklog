<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="QuickLog">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
            background: #f2f2f7;
            height: 100vh; height: 100dvh;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* ── App Screen ── */
        #appScreen { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* ── Header ── */
        .header {
            background: #1c1c2e; color: white;
            padding: 14px 16px 12px;
            padding-top: max(14px, env(safe-area-inset-top));
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }
        .header h1 { font-size: 18px; font-weight: 700; letter-spacing: 2px; }
        .header-right { display: flex; align-items: center; gap: 10px; }
        .entry-count {
            font-size: 12px; opacity: 0.6;
            background: rgba(255,255,255,0.1);
            padding: 3px 9px; border-radius: 20px;
        }
        .signout-btn {
            background: none; border: none; color: rgba(255,255,255,0.5);
            font-size: 12px; cursor: pointer; padding: 3px 0;
        }

        /* ── Sync Button + Badge ── */
        .cal-btn-wrap {
            position: relative; display: inline-flex; align-items: center;
        }
        .cal-sync-btn {
            font-size: 22px; text-decoration: none; opacity: 0.85;
            background: none; border: none; cursor: pointer; padding: 0;
            line-height: 1; transition: opacity 0.15s;
        }
        .cal-sync-btn:active { opacity: 0.5; }
        .sync-badge {
            position: absolute; top: -5px; right: -7px;
            background: #ff3b30; color: white;
            font-size: 10px; font-weight: 700;
            min-width: 17px; height: 17px;
            border-radius: 9px; padding: 0 3px;
            display: none; align-items: center; justify-content: center;
            border: 2px solid #1c1c2e;
        }

        /* ── Error Banner ── */
        .error-banner {
            background: #ff3b30; color: white;
            padding: 10px 16px; font-size: 13px; text-align: center;
            display: none;
        }
        .error-banner.show { display: block; }

        /* ── List ── */
        .list-container {
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding: 6px 12px 8px;
        }
        .empty-state {
            text-align: center; color: #aaa; margin-top: 80px;
            font-size: 15px; line-height: 2;
        }
        .import-btn {
            display: inline-block; margin-top: 20px;
            background: #1c1c2e; color: white;
            border: none; border-radius: 14px;
            padding: 13px 24px; font-size: 14px; font-weight: 700;

            transition: opacity 0.15s;
        }
        .import-btn:active { opacity: 0.7; }
        .date-group-header {

            padding: 14px 4px 6px; letter-spacing: 0.8px;
        }
        .entry-card {

            padding: 12px 14px; margin-bottom: 6px;

        }

        .entry-content { flex: 1; font-size: 15px; color: #1c1c2e; line-height: 1.55; word-break: break-word; }

        /* ── Future event card ── */
        .entry-card.future { background: #f0f6ff; border-left: 3px solid #0a84ff; }
        .entry-card.future .entry-time { color: #0a84ff; }

        /* ── Input Area ── */
        .input-area {
            background: white; border-top: 1px solid rgba(0,0,0,0.08);
            padding: 10px 14px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));

        .mic-btn {
            width: 44px; height: 44px; border-radius: 50%; border: none;

        .mic-btn.recording { background: #ff3b30; animation: pulse 1s infinite; }

            flex: 1; border: 1.5px solid #e0e0e8; border-radius: 22px;

        .loc-btn {

        .loc-btn:active { transform: scale(0.90); }

        .loc-modal {

        .loc-item {

        .loc-item-label { font-size: 11px; color: #999; font-weight: 700; margin-bottom: 3px; }

        /* ── Edit Modal ── */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200;
            display: flex; align-items: flex-end;
            opacity: 0; pointer-events: none; transition: opacity 0.22s;

        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal {
            background: white; border-radius: 22px 22px 0 0;
            padding: 20px 18px;
            padding-bottom: max(28px, env(safe-area-inset-bottom));

            transition: transform 0.28s cubic-bezier(0.32,0.72,0,1);
        }
        .modal-overlay.active .modal { transform: translateY(0); }
        .modal-drag-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 18px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
        .modal-title { font-size: 16px; font-weight: 700; color: #1c1c2e; }
        .modal-close {
            background: #f0f0f5; border: none; border-radius: 50%;
            width: 30px; height: 30px; font-size: 16px; color: #888;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .modal-field { margin-bottom: 14px; }
        .modal-label { font-size: 11px; color: #999; font-weight: 700; letter-spacing: 0.6px; margin-bottom: 6px; display: block; }
        .modal-input {
            width: 100%; border: 1.5px solid #e8e8f0; border-radius: 12px;
            padding: 12px 14px; font-size: 15px; font-family: inherit;
            outline: none; background: #f9f9fb; transition: border-color 0.2s;
        }
        .modal-input:focus { border-color: #1c1c2e; background: white; }
        textarea.modal-input { resize: none; min-height: 80px; line-height: 1.5; }
        .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
        .btn-delete { flex:1; padding:14px; border:1.5px solid #ff3b30; background:white; color:#ff3b30; border-radius:13px; font-size:15px; font-weight:600; cursor:pointer; }
        .btn-save   { flex:2; padding:14px; border:none; background:#1c1c2e; color:white; border-radius:13px; font-size:15px; font-weight:700; cursor:pointer; }

        /* ── Toast ── */
        .toast {
            position: fixed; bottom: 100px; left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: rgba(28,28,46,0.88); color: white;
            padding: 10px 20px; border-radius: 20px; font-size: 14px;
            opacity: 0; transition: opacity 0.2s, transform 0.2s;
            pointer-events: none; z-index: 300; white-space: nowrap;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>

<script>
// ============================================================
// 設定
// ============================================================
const SCOPES    = 'https://www.googleapis.com/auth/calendar.events';
const CAL_ID    = 'primary';
const APP_TAG   = 'quicklog';
const TZ        = Intl.DateTimeFormat().resolvedOptions().timeZone;

// ============================================================
// IndexedDB（端末内ストレージ＝一次保存先）
// ============================================================
const DB_NAME    = 'QuickLogDB';
const DB_VERSION = 1;
const STORE      = 'entries';
let db;

function openDB() {
    return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = e => {
            const d = e.target.result;
            if (!d.objectStoreNames.contains(STORE)) {
                d.createObjectStore(STORE, { keyPath: 'id' })
                 .createIndex('timestamp', 'timestamp', { unique: false });
            }
        };
        req.onsuccess = e => resolve(e.target.result);
        req.onerror   = e => reject(e.target.error);
    });
}

function dbPut(entry) {
    return new Promise(resolve => {
        const tx = db.transaction(STORE, 'readwrite');
        tx.objectStore(STORE).put(entry);
        tx.oncomplete = resolve;
    });
}

function dbDelete(id) {
    return new Promise(resolve => {
        const tx = db.transaction(STORE, 'readwrite');
        tx.objectStore(STORE).delete(id);
        tx.oncomplete = resolve;
    });
}

function getAllEntries() {
    return new Promise(resolve => {
        const req = db.transaction(STORE, 'readonly').objectStore(STORE).getAll();
        req.onsuccess = () => {
            // 旧フォーマット（quicklog.html由来）のエントリを正規化
            const entries = (req.result || []).map(e => ({
                gcalId:      null,
                endTimestamp: null,
                colorId:     null,
                syncStatus:  'pending', // デフォルト：未同期扱い
                ...e,                   // 既存フィールドで上書き
            }));
            resolve(entries);
        };
    });
}

function genId() {
    return `${Date.now()}_${Math.random().toString(36).slice(2)}`;
}

// ============================================================
// 状態
// ============================================================
let tokenClient;
let accessToken       = null;
let tokenExpiry       = 0;
let tokenRefreshTimer = null;
let currentEditEntry  = null;
let pendingAction     = null; // 認証後に実行するアクション ('sync' | 'import')

// ============================================================
// UI ユーティリティ
// ============================================================
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
}

function showError(msg) {
    const b = document.getElementById('errorBanner');
    b.textContent = msg;
    b.classList.add('show');
    setTimeout(() => b.classList.remove('show'), 4000);
}

function fmtTime(ts) {
    const d = new Date(ts);
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function fmtDateLabel(ts) {
    const d   = new Date(ts);
    const now = new Date();
    const today    = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const entryDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    const diff = Math.round((today - entryDay) / 86400000);
    if (diff === 0) return '今日';
    if (diff === 1) return '昨日';
    const days = ['日','月','火','水','木','金','土'];
    return `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}（${days[d.getDay()]}）`;
}

function toDatetimeLocal(ts) {
    const d   = new Date(ts);
    const pad = n => String(n).padStart(2,'0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function isTokenValid() {
    return accessToken && Date.now() < tokenExpiry - 60000;
}

// ============================================================
// 同期バッジ
// ============================================================
async function updateSyncBadge() {
    const entries = await getAllEntries();
    const n = entries.filter(e => e.syncStatus === 'pending' || e.syncStatus === 'delete_pending').length;
    const badge = document.getElementById('syncBadge');
    if (n > 0) {
        badge.textContent = n;
        badge.style.display = 'flex';
    } else {
        badge.style.display = 'none';
    }
}

// ============================================================
// Google Identity Services（同期専用）
// ============================================================
function initGIS() {
    if (typeof google === 'undefined') { setTimeout(initGIS, 200); return; }

    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: async (resp) => {
            if (resp.error) { showError('Google認証に失敗しました'); return; }
            accessToken = resp.access_token;
            tokenExpiry = Date.now() + (resp.expires_in * 1000);
            scheduleTokenRefresh();
            // 認証後に実行すべきアクションを処理
            const action = pendingAction || 'sync';
            pendingAction = null;
            if (action === 'import') await doImport();
            else                     await doSync();
        },
    });

    // 前回のトークンが残っていれば復元
    const savedToken  = localStorage.getItem('ql_token');
    const savedExpiry = Number(localStorage.getItem('ql_expiry') || 0);
    if (savedToken && Date.now() < savedExpiry - 60000) {
        accessToken  = savedToken;
        tokenExpiry  = savedExpiry;
        scheduleTokenRefresh();
    }
}

function scheduleTokenRefresh() {
    if (tokenRefreshTimer) clearTimeout(tokenRefreshTimer);
    const msUntilRefresh = tokenExpiry - Date.now() - 5 * 60 * 1000;
    if (msUntilRefresh > 0) {
        tokenRefreshTimer = setTimeout(() => {
            if (tokenClient) tokenClient.requestAccessToken({ prompt: '' });
        }, msUntilRefresh);
    }
    localStorage.setItem('ql_token',  accessToken);
    localStorage.setItem('ql_expiry', String(tokenExpiry));
}

// ============================================================
// Google Calendar API
// ============================================================
async function calFetch(path, options = {}) {
    const res = await fetch(`https://www.googleapis.com/calendar/v3${path}`, {
        ...options,
        headers: {
            Authorization: `Bearer ${accessToken}`,
            'Content-Type': 'application/json',
            ...(options.headers || {}),
        },
    });
    if (res.status === 401) { accessToken = null; tokenExpiry = 0; return null; }
    if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err?.error?.message || `HTTP ${res.status}`);
    }
    if (res.status === 204) return null;
    return res.json();
}

async function gcalCreate(entry) {
    const dt    = new Date(entry.timestamp).toISOString();
    const dtEnd = new Date(entry.endTimestamp || entry.timestamp + 60000).toISOString();
    return calFetch(`/calendars/${encodeURIComponent(CAL_ID)}/events`, {
        method: 'POST',
        body: JSON.stringify({
            summary: entry.content,
            start: { dateTime: dt, timeZone: TZ },
            end:   { dateTime: dtEnd, timeZone: TZ },
            extendedProperties: { private: { source: APP_TAG } },
            ...(entry.colorId ? { colorId: entry.colorId } : {}),
        }),
    });
}

async function gcalUpdate(entry) {
    const dt    = new Date(entry.timestamp).toISOString();
    const dtEnd = new Date(entry.endTimestamp || entry.timestamp + 60000).toISOString();
    return calFetch(`/calendars/${encodeURIComponent(CAL_ID)}/events/${entry.gcalId}`, {
        method: 'PUT',
        body: JSON.stringify({
            summary: entry.content,
            start: { dateTime: dt, timeZone: TZ },
            end:   { dateTime: dtEnd, timeZone: TZ },
            extendedProperties: { private: { source: APP_TAG } },
            ...(entry.colorId ? { colorId: entry.colorId } : {}),
        }),
    });
}

async function gcalDelete(gcalId) {
    return calFetch(`/calendars/${encodeURIComponent(CAL_ID)}/events/${gcalId}`, { method: 'DELETE' });
}

// ============================================================
// 同期処理（📅ボタン → GCal一括反映）
// ============================================================
async function requestSync() {
    if (isTokenValid()) {
        await doSync();
    } else {
        // 認証→コールバック内で doSync() が呼ばれる
        if (!tokenClient) { showError('Google連携の準備中です。しばらく待ってから再試行してください。'); return; }
        tokenClient.requestAccessToken({ prompt: '' });
    }
}

async function doSync() {
    const entries = await getAllEntries();
    const pending = entries.filter(e => e.syncStatus === 'pending' || e.syncStatus === 'delete_pending');

    if (pending.length === 0) { showToast('同期済みです ✓'); return; }

    const calBtn = document.getElementById('calSyncBtn');
    calBtn.textContent = '⏳';

    let synced = 0, failed = 0;

    for (const entry of pending) {
        try {
            if (entry.syncStatus === 'delete_pending') {
                if (entry.gcalId) await gcalDelete(entry.gcalId);
                await dbDelete(entry.id);
            } else {
                // pending（新規 or 更新）
                if (entry.gcalId) {
                    await gcalUpdate(entry);
                } else {
                    const result = await gcalCreate(entry);
                    if (result?.id) entry.gcalId = result.id;
                }
                entry.syncStatus = 'synced';
                await dbPut(entry);
            }
            synced++;
        } catch(err) {
            failed++;
        }
    }

    calBtn.textContent = '📅';
    await updateSyncBadge();

    if (failed > 0) showError(`${synced}件同期、${failed}件失敗`);
    else            showToast(`${synced}件をGoogleカレンダーに同期しました ✓`);
}

document.getElementById('calSyncBtn').addEventListener('click', async () => {
    // ユーザー操作の直後に開く（ポップアップブロック回避）
    window.open('https://calendar.google.com', '_blank');
    await requestSync();
});

// ============================================================
// GCal → IndexedDB インポート（既存データの取り込み）
// ============================================================
async function requestImport() {
    if (isTokenValid()) {
        await doImport();
    } else {
        // 認証後にインポートを実行するよう一時フラグ
        pendingAction = 'import';
        if (!tokenClient) { showError('Google連携の準備中です。しばらく待ってから再試行してください。'); pendingAction = null; return; }
        tokenClient.requestAccessToken({ prompt: '' });
    }
}

async function doImport() {
    const btn = document.getElementById('importBtn');
    if (btn) { btn.textContent = '⏳ 読み込み中…'; btn.disabled = true; }

    try {
        const LOAD_DAYS = 90;
        const timeMin = new Date(Date.now() - LOAD_DAYS * 86400000).toISOString();
        const timeMax = new Date(Date.now() + 60 * 86400000).toISOString();

        const params = new URLSearchParams({
            timeMin, timeMax,
            orderBy: 'startTime',
            singleEvents: 'true',
            privateExtendedProperty: `source=${APP_TAG}`,
            maxResults: '500',
        });

        const data = await calFetch(`/calendars/${encodeURIComponent(CAL_ID)}/events?${params}`);
        if (!data) { showError('インポートに失敗しました（認証エラー）'); return; }

        const events = data.items || [];
        if (events.length === 0) { showToast('インポートできるデータがありませんでした'); return; }

        // 既存IndexedDBエントリのgcalIdセットを取得（重複防止）
        const existing = await getAllEntries();
        const existingGcalIds = new Set(existing.map(e => e.gcalId).filter(Boolean));

        let imported = 0;
        for (const ev of events) {
            if (existingGcalIds.has(ev.id)) continue; // 重複スキップ
            const ts    = new Date(ev.start.dateTime || ev.start.date).getTime();
            const endTs = ev.end?.dateTime ? new Date(ev.end.dateTime).getTime() : null;
            await dbPut({
                id:          genId(),
                gcalId:      ev.id,
                content:     ev.summary || '',
                timestamp:   ts,
                endTimestamp: endTs,
                colorId:     ev.colorId || null,
                syncStatus:  'synced',
            });
            imported++;
        }

        await renderList();
        await updateSyncBadge();
        showToast(`${imported}件のデータを読み込みました ✓`);

    } catch (e) {
        showError('インポートエラー: ' + e.message);
        if (btn) { btn.textContent = '📅 Googleカレンダーから読み込む'; btn.disabled = false; }
    }
}

// ============================================================
// Render（IndexedDB から直接表示）
// ============================================================
async function renderList() {
    const entries = await getAllEntries();
    // delete_pending（削除待ち）は一覧から除外
    const visible = entries.filter(e => e.syncStatus !== 'delete_pending');

    const container = document.getElementById('listContainer');
    document.getElementById('entryCount').textContent = `${visible.length}件`;

    if (visible.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                まだ記録がありません<br>
                <span style="font-size:32px;display:block;margin-top:10px;">📋</span>
                <button class="import-btn" id="importBtn">📅 Googleカレンダーから読み込む</button>
            </div>`;
        document.getElementById('importBtn').addEventListener('click', requestImport);
        return;
    }

    const now    = Date.now();
    const future = visible.filter(e => e.timestamp > now).sort((a,b) => a.timestamp - b.timestamp);
    const past   = visible.filter(e => e.timestamp <= now).sort((a,b) => b.timestamp - a.timestamp);
    const sorted = [...future, ...past];

    container.innerHTML = '';
    let lastLabel = null;

    sorted.forEach(entry => {
        const isFuture  = entry.timestamp > now;
        const isPending = entry.syncStatus === 'pending';
        const label     = isFuture ? '⏰ 予定' : fmtDateLabel(entry.timestamp);

        if (label !== lastLabel) {
            const hdr = document.createElement('div');
            hdr.className   = 'date-group-header';
            hdr.textContent = label;
            container.appendChild(hdr);
            lastLabel = label;
        }

        const card = document.createElement('div');
        card.className = 'entry-card' + (isFuture ? ' future' : '');
        card.innerHTML = `
            <div class="entry-time">${isFuture ? fmtDateLabel(entry.timestamp).replace('⏰ ','') + '<br>' : ''}${fmtTime(entry.timestamp)}</div>
            <div class="entry-content">${escHtml(entry.content)}${isPending ? '<span class="pending-dot">●</span>' : ''}</div>
            <button class="entry-edit-btn" aria-label="編集">✏️</button>
        `;

        const editBtn = card.querySelector('.entry-edit-btn');
        editBtn.addEventListener('click', e => { e.stopPropagation(); openEditModal(entry); });
        card.addEventListener('click', () => openEditModal(entry));
        container.appendChild(card);
    });
}

// ============================================================
// Submit（IndexedDB に即保存）
// ============================================================
const textInput = document.getElementById('textInput');
const submitBtn = document.getElementById('submitBtn');

textInput.addEventListener('input', () => {
    textInput.style.height = 'auto';
    textInput.style.height = Math.min(textInput.scrollHeight, 110) + 'px';
    submitBtn.disabled = !textInput.value.trim();
});

textInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitEntry(); }
});

submitBtn.addEventListener('click', submitEntry);

async function submitEntry() {
    const content = textInput.value.trim();
    if (!content) return;
    submitBtn.disabled = true;

    const isPlan = document.getElementById('modeBtnPlan').classList.contains('active-plan');
    let timestamp    = Date.now();
    let endTimestamp = null;
    let colorId      = null;

    if (isPlan) {
        const dtVal    = document.getElementById('scheduleInput').value;
        const dtEndVal = document.getElementById('scheduleEndInput').value;
        if (!dtVal) { showError('予定の開始日時を選択してください'); return; }
        timestamp = new Date(dtVal).getTime();
        if (isNaN(timestamp)) { showError('開始日時が正しくありません'); return; }
        if (dtEndVal) {
            endTimestamp = new Date(dtEndVal).getTime();
            if (isNaN(endTimestamp) || endTimestamp <= timestamp) {
                showError('終了日時は開始日時より後にしてください'); return;
            }
        }
        colorId = '3'; // オレンジ（予定）
    }

    const entry = {
        id:          genId(),
        gcalId:      null,
        content,
        timestamp,
        endTimestamp,
        colorId,
        syncStatus:  'pending',
    };

    await dbPut(entry);
    textInput.value = '';
    textInput.style.height = 'auto';
    if (isPlan) setMode('log');
    textInput.focus();
    await renderList();
    await updateSyncBadge();
    document.getElementById('listContainer').scrollTop = 0;
    showToast(isPlan ? '予定を追加しました ✓' : '記録しました ✓');
}

// ============================================================
// Voice Input
// ============================================================
const micBtn = document.getElementById('micBtn');
let recognition = null, isRecording = false;

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SR) {
    recognition = new SR();
    recognition.lang           = 'ja-JP';
    recognition.continuous     = false;
    recognition.interimResults = true;

    recognition.onresult = e => {
        const txt = Array.from(e.results).map(r => r[0].transcript).join('');
        textInput.value = txt;
        textInput.style.height = 'auto';
        textInput.style.height = Math.min(textInput.scrollHeight, 110) + 'px';
        submitBtn.disabled = !txt.trim();
    };

    const stopRec = () => { isRecording = false; micBtn.classList.remove('recording'); micBtn.textContent = '🎤'; };
    recognition.onend   = stopRec;
    recognition.onerror = stopRec;

    micBtn.addEventListener('click', () => {
        if (isRecording) { recognition.stop(); }
        else { recognition.start(); isRecording = true; micBtn.classList.add('recording'); micBtn.textContent = '⏹'; }
    });
} else {
    micBtn.style.opacity = '0.3';
    micBtn.title = '音声入力非対応ブラウザ';
}

// ============================================================
// Mode Toggle（記録 / 予定）
// ============================================================
const modeBtnLog    = document.getElementById('modeBtnLog');
const modeBtnPlan   = document.getElementById('modeBtnPlan');
const scheduleRow   = document.getElementById('scheduleRow');
const scheduleInput = document.getElementById('scheduleInput');

function syncEndTime() {
    const startVal = scheduleInput.value;
    if (!startVal) return;
    const endInput = document.getElementById('scheduleEndInput');
    if (!endInput.value || new Date(endInput.value) <= new Date(startVal)) {
        const d   = new Date(new Date(startVal).getTime() + 60 * 60 * 1000);
        const pad = n => String(n).padStart(2,'0');
        endInput.value = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }
}
scheduleInput.addEventListener('change', syncEndTime);

function setMode(mode) {
    if (mode === 'log') {
        modeBtnLog.classList.add('active-log');
        modeBtnLog.classList.remove('active-plan');
        modeBtnPlan.classList.remove('active-plan');
        scheduleRow.classList.remove('show');
        textInput.placeholder = '何をした？（Enterで即記録）';
    } else {
        modeBtnPlan.classList.add('active-plan');
        modeBtnLog.classList.remove('active-log');
        scheduleRow.classList.add('show');
        if (!scheduleInput.value) {
            const d   = new Date(Date.now() + 86400000);
            const pad = n => String(n).padStart(2,'0');
            scheduleInput.value = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
        }
        syncEndTime();
        textInput.placeholder = '予定の内容を入力';
    }
}

modeBtnLog.addEventListener('click',  () => setMode('log'));
modeBtnPlan.addEventListener('click', () => setMode('plan'));

// ============================================================
// Location（現在地挿入）
// ============================================================
const locBtn          = document.getElementById('locBtn');
const locModalOverlay = document.getElementById('locModalOverlay');

function closeLocModal() { locModalOverlay.classList.remove('active'); }
document.getElementById('locModalClose').addEventListener('click', closeLocModal);
locModalOverlay.addEventListener('click', e => { if (e.target === locModalOverlay) closeLocModal(); });

locBtn.addEventListener('click', async () => {
    if (!navigator.geolocation) { showError('位置情報が利用できません'); return; }

    locBtn.classList.add('loading');
    locBtn.textContent = '⏳';

    try {
        const pos = await new Promise((resolve, reject) =>
            navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true, timeout: 10000 })
        );
        const { latitude: lat, longitude: lng } = pos.coords;

        const res  = await fetch(
            `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=ja&zoom=18`,
            { headers: { 'User-Agent': 'QuickLog/1.0' } }
        );
        const data = await res.json();
        const addr = data.address || {};

        const candidates = [];
        const place = addr.amenity || addr.shop || addr.office || addr.tourism || addr.leisure || addr.building;
        const road  = addr.road || addr.pedestrian || addr.footway;
        const area  = addr.suburb || addr.neighbourhood || addr.quarter || addr.city_district;
        const city  = addr.city || addr.town || addr.village || addr.county;

        if (place)             candidates.push({ label: '施設名',    name: place });
        if (place && road)     candidates.push({ label: '施設＋通り', name: `${place}（${road}）` });
        if (road && city)      candidates.push({ label: 'エリア',     name: `${road}、${area || city}` });
        if (city)              candidates.push({ label: '市区町村',   name: area ? `${area}、${city}` : city });
        if (candidates.length === 0)
            candidates.push({ label: '取得した住所', name: data.display_name?.split(',')[0] || '不明' });

        const container = document.getElementById('locCandidates');
        container.innerHTML = '';
        candidates.forEach(c => {
            const item = document.createElement('div');
            item.className = 'loc-item';
            item.innerHTML = `<div class="loc-item-label">${c.label}</div><div class="loc-item-name">${c.name}</div>`;
            item.addEventListener('click', () => {
                const sep = textInput.value.trim() ? ' ' : '';
                textInput.value += sep + c.name;
                textInput.style.height = 'auto';
                textInput.style.height = Math.min(textInput.scrollHeight, 110) + 'px';
                submitBtn.disabled = !textInput.value.trim();
                closeLocModal();
                textInput.focus();
            });
            container.appendChild(item);
        });

        locModalOverlay.classList.add('active');

    } catch (err) {
        const msg = err.code === 1 ? '位置情報の許可が必要です' :
                    err.code === 2 ? '位置情報を取得できませんでした' :
                    err.code === 3 ? '位置情報の取得がタイムアウトしました' : '位置情報エラー';
        showError(msg);
    } finally {
        locBtn.classList.remove('loading');
        locBtn.textContent = '📍';
    }
});

// ============================================================
// Edit Modal（IndexedDB エントリを編集）
// ============================================================
const modalOverlay = document.getElementById('modalOverlay');

function openEditModal(entry) {
    currentEditEntry = entry;
    document.getElementById('editContent').value  = entry.content;
    document.getElementById('editDatetime').value = toDatetimeLocal(entry.timestamp);
    const endTs = entry.endTimestamp || entry.timestamp + 60 * 60 * 1000;
    document.getElementById('editEndDatetime').value = toDatetimeLocal(endTs);
    modalOverlay.classList.add('active');
    setTimeout(() => document.getElementById('editContent').focus(), 300);
}

function closeModal() { modalOverlay.classList.remove('active'); currentEditEntry = null; }

document.getElementById('modalClose').addEventListener('click', closeModal);
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });

document.getElementById('saveBtn').addEventListener('click', async () => {
    const content  = document.getElementById('editContent').value.trim();
    const dtVal    = document.getElementById('editDatetime').value;
    const dtEndVal = document.getElementById('editEndDatetime').value;
    if (!content || !dtVal) return;
    const startTs = new Date(dtVal).getTime();
    let endTs = null;
    if (dtEndVal) {
        endTs = new Date(dtEndVal).getTime();
        if (isNaN(endTs) || endTs <= startTs) { showError('終了日時は開始日時より後にしてください'); return; }
    }
    const updated = { ...currentEditEntry, content, timestamp: startTs, endTimestamp: endTs, syncStatus: 'pending' };
    await dbPut(updated);
    closeModal();
    await renderList();
    await updateSyncBadge();
    showToast('更新しました ✓');
});

document.getElementById('deleteBtn').addEventListener('click', async () => {
    if (!confirm('この記録を削除しますか？')) return;
    const entry = currentEditEntry;
    if (entry.gcalId) {
        // Google Calendarに同期済み → 次回同期時に削除
        await dbPut({ ...entry, syncStatus: 'delete_pending' });
    } else {
        // ローカルのみ → 即削除
        await dbDelete(entry.id);
    }
    closeModal();
    await renderList();
    await updateSyncBadge();
    showToast('削除しました');
});

// ============================================================
// 連携解除ボタン
// ============================================================
document.getElementById('signoutBtn').addEventListener('click', () => {
    if (!confirm('Google連携を解除しますか？\n（ローカルの記録はそのまま残ります）')) return;
    if (accessToken && typeof google !== 'undefined') {
        google.accounts.oauth2.revoke(accessToken, () => {});
    }
    accessToken = null;
    tokenExpiry = 0;
    localStorage.removeItem('ql_token');
    localStorage.removeItem('ql_expiry');
    if (tokenRefreshTimer) { clearTimeout(tokenRefreshTimer); tokenRefreshTimer = null; }
    showToast('Google連携を解除しました');
});

// ============================================================
// Init（認証不要で即起動）
// ============================================================
window.addEventListener('load', async () => {
    try {
        db = await openDB();
        await renderList();
        await updateSyncBadge();
    } catch(err) {
        document.getElementById('errorBanner').textContent = 'データベース初期化エラー: ' + err.message;
        document.getElementById('errorBanner').classList.add('show');
    }
    setTimeout(() => textInput.focus(), 150);

    // マイク権限キャッシュ（起動音の原因になるSR.start()は使わない）
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(function(stream) { stream.getTracks().forEach(function(t) { t.stop(); }); })
            .catch(function() {});
    }

    initGIS(); // バックグラウンドでGIS初期化（同期ボタン押下に備える）
});
