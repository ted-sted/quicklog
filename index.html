    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
            background: #f2f2f7;
            height: 100vh; height: 100dvh;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* ── Login Screen ── */
        #loginScreen {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 40px 32px; gap: 24px; text-align: center;
        }

        .login-title { font-size: 26px; font-weight: 700; color: #1c1c2e; letter-spacing: 2px; }
        .login-sub { font-size: 14px; color: #888; line-height: 1.7; }
        .login-btn {

            padding: 16px 36px; font-size: 16px; font-weight: 700;
            cursor: pointer; font-family: inherit;
            transition: transform 0.12s, opacity 0.12s;

        /* ── App Screen ── */
        #appScreen { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* ── Header ── */
        .header {
            background: #1c1c2e; color: white;
            padding: 14px 16px 12px;

            display: flex; align-items: center; justify-content: space-between;

        }
        .header h1 { font-size: 18px; font-weight: 700; letter-spacing: 2px; }
        .header-right { display: flex; align-items: center; gap: 10px; }
        .entry-count {
            font-size: 12px; opacity: 0.6;
            background: rgba(255,255,255,0.1);

        }
        .signout-btn {
            background: none; border: none; color: rgba(255,255,255,0.5);
            font-size: 12px; cursor: pointer; padding: 3px 0;
        }

        /* ── Loading ── */
        .loading-state {

        }
        .spinner {

            padding: 6px 12px 8px;
        }
        .empty-state {

        }

        }
        .entry-card {

        .entry-content { flex: 1; font-size: 15px; color: #1c1c2e; line-height: 1.55; word-break: break-word; }
        .entry-edit-btn { background: none; border: none; font-size: 16px; padding: 2px 0 2px 6px; color: #ccc; cursor: pointer; flex-shrink: 0; }

        /* ── Input Area ── */
        .input-area {
            background: white; border-top: 1px solid rgba(0,0,0,0.08);
            padding: 10px 14px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            flex-shrink: 0;
        }
        .input-row { display: flex; gap: 8px; align-items: flex-end; }
        .mic-btn {
            width: 44px; height: 44px; border-radius: 50%; border: none;

        .text-input {

        .submit-btn {

        .modal-overlay {

            position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 300;
            display: flex; align-items: flex-end;

        .loc-modal {
            background: white; border-radius: 22px 22px 0 0;
            padding: 20px 18px;

        .loc-item {

        .loc-item:active { background: #e8f0fe; border-color: #0a84ff; }
        .loc-item-label { font-size: 11px; color: #999; font-weight: 700; margin-bottom: 3px; }
        .loc-item-name  { color: #1c1c2e; font-weight: 500; }

        /* ── Future event card ── */

            background: #f0f6ff; border-left: 3px solid #0a84ff;
        }
        .entry-card.future .entry-time { color: #0a84ff; }
    </style>
</head>

<script>
// ============================================================
// 設定
// ============================================================
const SCOPES   = 'https://www.googleapis.com/auth/calendar.events';
const CAL_ID   = 'primary';
const APP_TAG  = 'quicklog';          // このアプリが作ったイベントの識別タグ
const TZ       = Intl.DateTimeFormat().resolvedOptions().timeZone;
const LOAD_DAYS = 30;                 // 何日前まで表示するか

// ============================================================
// 状態
// ============================================================
let tokenClient;
let accessToken      = localStorage.getItem('ql_token') || null;
let tokenExpiry      = Number(localStorage.getItem('ql_expiry') || 0);
let currentEditId    = null;
let tokenRefreshTimer = null; // 自動リフレッシュ用タイマー

// ============================================================
// UI ユーティリティ
// ============================================================
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
}

function showError(msg) {
    const b = document.getElementById('errorBanner');
    b.textContent = msg;
    b.classList.add('show');
    setTimeout(() => b.classList.remove('show'), 4000);
}

function fmtTime(ts) {
    const d = new Date(ts);
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function fmtDateLabel(ts) {
    const d   = new Date(ts);
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const entryDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    const diff = Math.round((today - entryDay) / 86400000);
    if (diff === 0) return '今日';
    if (diff === 1) return '昨日';
    const days = ['日','月','火','水','木','金','土'];
    return `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}（${days[d.getDay()]}）`;
}

function toDatetimeLocal(ts) {
    const d   = new Date(ts);
    const pad = n => String(n).padStart(2,'0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function isTokenValid() {
    return accessToken && Date.now() < tokenExpiry - 60000;
}

// トークン期限の5分前に自動でサイレント再取得するタイマーをセット
function scheduleTokenRefresh() {
    if (tokenRefreshTimer) clearTimeout(tokenRefreshTimer);
    const msUntilRefresh = tokenExpiry - Date.now() - 5 * 60 * 1000; // 期限5分前
    if (msUntilRefresh > 0) {
        tokenRefreshTimer = setTimeout(() => {
            if (localStorage.getItem('ql_logged_in')) {
                tokenClient.requestAccessToken({ prompt: '' });
            }
        }, msUntilRefresh);
    }
}

// ============================================================
// Google Identity Services
// ============================================================
function initGIS() {
    if (typeof google === 'undefined') {
        setTimeout(initGIS, 200);
        return;
    }

    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: async (resp) => {
            if (resp.error) {
                // サイレント認証失敗はエラー表示せずログイン画面へ
                showLogin();
                return;
            }
            accessToken = resp.access_token;
            tokenExpiry = Date.now() + (resp.expires_in * 1000);
            localStorage.setItem('ql_token', accessToken);
            localStorage.setItem('ql_expiry', String(tokenExpiry));
            localStorage.setItem('ql_logged_in', '1');
            scheduleTokenRefresh(); // 期限5分前に自動再取得をスケジュール
            showApp();
            await loadEntries();
        },
    });

    // 有効なトークンがあればそのままアプリ画面へ
    if (isTokenValid()) {
        document.getElementById('splashScreen').style.display = 'none';
        scheduleTokenRefresh(); // 残り期限に合わせて自動リフレッシュをスケジュール
        showApp();
        loadEntries();
    }
    // 以前ログインしていた → スプラッシュ表示しつつサイレント認証を試みる
    else if (localStorage.getItem('ql_logged_in')) {
        showSplash();
        // タイムアウト：4秒で応答がなければログイン画面へ
        const silentAuthTimer = setTimeout(() => showLogin(), 12000); // モバイル回線考慮で12秒
        const origCallback = tokenClient.callback;
        tokenClient.callback = async (resp) => {
            clearTimeout(silentAuthTimer);
            tokenClient.callback = origCallback;
            await origCallback(resp);
        };
        tokenClient.requestAccessToken({ prompt: '' });
    }
    // 初回 → ログイン画面
    else {
        showLogin();
    }
}

function requestToken(prompt = '') {
    tokenClient.requestAccessToken(prompt ? { prompt } : {});
}

async function ensureToken() {
    if (!isTokenValid()) {
        requestToken();
        return false; // 再認証中
    }
    return true;
}

// ============================================================
// 画面切り替え
// ============================================================
function showApp() {
    document.getElementById('loginScreen').style.display = 'none';
    const app = document.getElementById('appScreen');
    app.style.display = 'flex';
    setTimeout(() => document.getElementById('textInput').focus(), 300);
    // マイク権限を起動時に一度取得してキャッシュ（毎回許可ダイアログを防ぐ）
    // ※ SpeechRecognition.start() は iOS でシステム音（ポン）が鳴るため使わない
    if (navigator.mediaDevices?.getUserMedia) {
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => { stream.getTracks().forEach(t => t.stop()); })
            .catch(() => {}); // 拒否されても無視
    }
}

function showLogin() {
    if (tokenRefreshTimer) { clearTimeout(tokenRefreshTimer); tokenRefreshTimer = null; }
    accessToken = null;
    localStorage.removeItem('ql_token');
    localStorage.removeItem('ql_expiry');
    localStorage.removeItem('ql_logged_in');
    document.getElementById('splashScreen').style.display  = 'none';
    document.getElementById('appScreen').style.display    = 'none';
    document.getElementById('loginScreen').style.display  = 'flex';
}

function showSplash() {
    document.getElementById('splashScreen').style.display  = 'flex';
    document.getElementById('loginScreen').style.display  = 'none';
    document.getElementById('appScreen').style.display    = 'none';
}

// ============================================================
// Calendar API
// ============================================================
async function calFetch(path, options = {}) {
    if (!isTokenValid()) { requestToken(); return null; }

    const res = await fetch(`https://www.googleapis.com/calendar/v3${path}`, {
        ...options,
        headers: {
            Authorization: `Bearer ${accessToken}`,
            'Content-Type': 'application/json',
            ...(options.headers || {}),
        },
    });

    if (res.status === 401) {
        requestToken();
        return null;
    }
    if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err?.error?.message || `HTTP ${res.status}`);
    }
    if (res.status === 204) return null;
    return res.json();
}

async function loadEntries() {
    const container = document.getElementById('listContainer');
    container.innerHTML = '<div class="loading-state"><div class="spinner"></div><div>読み込み中…</div></div>';

    try {
        const timeMin = new Date(Date.now() - LOAD_DAYS * 86400000).toISOString();
        const timeMax = new Date(Date.now() + 30 * 86400000).toISOString(); // 未来30日まで

        const params = new URLSearchParams({
            timeMin, timeMax,
            orderBy: 'startTime',
            singleEvents: 'true',
            privateExtendedProperty: `source=${APP_TAG}`,
            maxResults: '200',
        });

        const data = await calFetch(`/calendars/${encodeURIComponent(CAL_ID)}/events?${params}`);
        if (!data) return;

        renderList(data.items || []);
    } catch (e) {
        showError('読み込みエラー: ' + e.message);
        container.innerHTML = '<div class="empty-state">読み込みに失敗しました<br>再読み込みしてください</div>';
    }
}

async function createEvent(content, timestamp, colorId = null, endTimestamp = null) {
    const dt    = new Date(timestamp).toISOString();
    const dtEnd = new Date(endTimestamp || timestamp + 60000).toISOString();

    return calFetch(`/calendars/${encodeURIComponent(CAL_ID)}/events`, {
        method: 'POST',
        body: JSON.stringify({
            summary: content,
            start: { dateTime: dt, timeZone: TZ },
            end:   { dateTime: dtEnd, timeZone: TZ },
            extendedProperties: { private: { source: APP_TAG } },
            ...(colorId ? { colorId } : {}),
        }),
    });
}

async function updateEvent(eventId, content, timestamp, endTimestamp = null) {
    const dt    = new Date(timestamp).toISOString();
    const dtEnd = new Date(endTimestamp || timestamp + 60000).toISOString();

    return calFetch(`/calendars/${encodeURIComponent(CAL_ID)}/events/${eventId}`, {
        method: 'PUT',
        body: JSON.stringify({
            summary: content,
            start: { dateTime: dt, timeZone: TZ },
            end:   { dateTime: dtEnd, timeZone: TZ },
            extendedProperties: { private: { source: APP_TAG } },
        }),
    });
}

async function deleteEvent(eventId) {
    return calFetch(`/calendars/${encodeURIComponent(CAL_ID)}/events/${eventId}`, { method: 'DELETE' });
}

// ============================================================
// Render
// ============================================================
function renderList(events) {
    const container = document.getElementById('listContainer');
    document.getElementById('entryCount').textContent = `${events.length}件`;

    if (events.length === 0) {
        container.innerHTML = '<div class="empty-state">まだ記録がありません<br><span style="font-size:32px;display:block;margin-top:10px;">📋</span></div>';
        return;
    }

    const now = Date.now();

    // 未来の予定を上、過去の記録を新しい順に
    const future = [...events].filter(ev => new Date(ev.start.dateTime || ev.start.date).getTime() > now)
                              .sort((a, b) => new Date(a.start.dateTime) - new Date(b.start.dateTime));
    const past   = [...events].filter(ev => new Date(ev.start.dateTime || ev.start.date).getTime() <= now)
                              .sort((a, b) => new Date(b.start.dateTime) - new Date(a.start.dateTime));
    const sorted = [...future, ...past];

    container.innerHTML = '';
    let lastLabel = null;

    sorted.forEach(ev => {
        const ts       = new Date(ev.start.dateTime || ev.start.date).getTime();
        const isFuture = ts > now;
        const label    = isFuture ? '⏰ 予定' : fmtDateLabel(ts);

        if (label !== lastLabel) {
            const hdr = document.createElement('div');
            hdr.className = 'date-group-header';
            hdr.textContent = label;
            container.appendChild(hdr);
            lastLabel = label;
        }

        const card = document.createElement('div');
        card.className = 'entry-card' + (isFuture ? ' future' : '');
        card.innerHTML = `
            <div class="entry-time">${isFuture ? fmtDateLabel(ts).replace('⏰ ','') + '<br>' : ''}${fmtTime(ts)}</div>
            <div class="entry-content">${escHtml(ev.summary || '')}</div>
            <button class="entry-edit-btn" aria-label="編集">✏️</button>
        `;

        const editBtn = card.querySelector('.entry-edit-btn');
        editBtn.addEventListener('click', e => { e.stopPropagation(); openEditModal(ev, ts); });
        card.addEventListener('click', () => openEditModal(ev, ts));

        container.appendChild(card);
    });
}

// ============================================================
// Submit
// ============================================================
const textInput = document.getElementById('textInput');
const submitBtn = document.getElementById('submitBtn');

textInput.addEventListener('input', () => {
    textInput.style.height = 'auto';
    textInput.style.height = Math.min(textInput.scrollHeight, 110) + 'px';
    submitBtn.disabled = !textInput.value.trim();
});

textInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitEntry(); }
});

submitBtn.addEventListener('click', submitEntry);

async function submitEntry() {
    const content = textInput.value.trim();
    if (!content) return;

    const isPlan = document.getElementById('modeBtnPlan').classList.contains('active-plan');

    let timestamp = Date.now();
    let endTimestamp = null;
    if (isPlan) {
        const dtVal    = document.getElementById('scheduleInput').value;
        const dtEndVal = document.getElementById('scheduleEndInput').value;
        if (!dtVal) { showError('予定の開始日時を選択してください'); return; }
        timestamp = new Date(dtVal).getTime();
        if (isNaN(timestamp)) { showError('開始日時が正しくありません'); return; }
        if (dtEndVal) {
            endTimestamp = new Date(dtEndVal).getTime();
            if (isNaN(endTimestamp) || endTimestamp <= timestamp) {
                showError('終了日時は開始日時より後にしてください'); return;
            }
        }
    }

    submitBtn.disabled = true;
    submitBtn.textContent = '…';

    try {
        // 予定はcolorId "3"（タンジェリン＝オレンジ）、記録はデフォルト
        await createEvent(content, timestamp, isPlan ? '3' : null, endTimestamp);
        textInput.value = '';
        textInput.style.height = 'auto';
        if (isPlan) setMode('log'); // 予定送信後は記録モードに戻す
        textInput.focus();
        await loadEntries();
        document.getElementById('listContainer').scrollTop = 0;
        showToast(isPlan ? '予定を追加しました ✓' : '記録しました ✓');
    } catch (e) {
        showError('保存エラー: ' + e.message);
    } finally {
        submitBtn.textContent = '↑';
        submitBtn.disabled = !textInput.value.trim();
    }
}

// ============================================================
// Voice Input
// ============================================================
const micBtn = document.getElementById('micBtn');
let recognition = null, isRecording = false;

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SR) {
    recognition = new SR();
    recognition.lang           = 'ja-JP';
    recognition.continuous     = false;
    recognition.interimResults = true;

    recognition.onresult = e => {
        const txt = Array.from(e.results).map(r => r[0].transcript).join('');
        textInput.value = txt;
        textInput.style.height = 'auto';
        textInput.style.height = Math.min(textInput.scrollHeight, 110) + 'px';
        submitBtn.disabled = !txt.trim();
    };

    const stopRec = () => { isRecording = false; micBtn.classList.remove('recording'); micBtn.textContent = '🎤'; };
    recognition.onend   = stopRec;
    recognition.onerror = stopRec;

    micBtn.addEventListener('click', () => {
        if (isRecording) { recognition.stop(); }
        else { recognition.start(); isRecording = true; micBtn.classList.add('recording'); micBtn.textContent = '⏹'; }
    });
} else {
    micBtn.style.opacity = '0.3';
    micBtn.title = '音声入力非対応ブラウザ';
}

// ============================================================
// Mode Toggle（記録 / 予定）
// ============================================================
const modeBtnLog    = document.getElementById('modeBtnLog');
const modeBtnPlan   = document.getElementById('modeBtnPlan');
const scheduleRow   = document.getElementById('scheduleRow');
const scheduleInput = document.getElementById('scheduleInput');

// 開始時刻から終了時刻（+1時間）を自動セット
function syncEndTime() {
    const startVal = scheduleInput.value;
    if (!startVal) return;
    const endInput = document.getElementById('scheduleEndInput');
    // 終了が未入力 or 開始以前の場合のみ上書き
    if (!endInput.value || new Date(endInput.value) <= new Date(startVal)) {
        const d   = new Date(new Date(startVal).getTime() + 60 * 60 * 1000);
        const pad = n => String(n).padStart(2,'0');
        endInput.value = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }
}
scheduleInput.addEventListener('change', syncEndTime);

function setMode(mode) {
    if (mode === 'log') {
        modeBtnLog.classList.add('active-log');
        modeBtnLog.classList.remove('active-plan');
        modeBtnPlan.classList.remove('active-plan');
        scheduleRow.classList.remove('show');
        document.getElementById('textInput').placeholder = '何をした？（Enterで即記録）';
    } else {
        modeBtnPlan.classList.add('active-plan');
        modeBtnLog.classList.remove('active-log');
        scheduleRow.classList.add('show');
        // デフォルト：明日の現在時刻
        if (!scheduleInput.value) {
            const d   = new Date(Date.now() + 86400000);
            const pad = n => String(n).padStart(2,'0');
            scheduleInput.value = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
        }
        syncEndTime(); // 終了時刻を開始+1時間で自動セット
        document.getElementById('textInput').placeholder = '予定の内容を入力';
    }
}

modeBtnLog.addEventListener('click',  () => setMode('log'));
modeBtnPlan.addEventListener('click', () => setMode('plan'));

// ============================================================
// Location（現在地挿入）
// ============================================================
const locBtn          = document.getElementById('locBtn');
const locModalOverlay = document.getElementById('locModalOverlay');

function closeLocModal() { locModalOverlay.classList.remove('active'); }

document.getElementById('locModalClose').addEventListener('click', closeLocModal);
locModalOverlay.addEventListener('click', e => { if (e.target === locModalOverlay) closeLocModal(); });

locBtn.addEventListener('click', async () => {
    if (!navigator.geolocation) { showError('位置情報が利用できません'); return; }

    locBtn.classList.add('loading');
    locBtn.textContent = '⏳';

    try {
        const pos = await new Promise((resolve, reject) =>
            navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true, timeout: 10000 })
        );
        const { latitude: lat, longitude: lng } = pos.coords;

        const res  = await fetch(
            `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=ja&zoom=18`,
            { headers: { 'User-Agent': 'QuickLog/1.0' } }
        );
        const data = await res.json();
        const addr = data.address || {};

        // 候補を組み立て
        const candidates = [];
        const place = addr.amenity || addr.shop || addr.office || addr.tourism || addr.leisure || addr.building;
        const road  = addr.road || addr.pedestrian || addr.footway;
        const area  = addr.suburb || addr.neighbourhood || addr.quarter || addr.city_district;
        const city  = addr.city || addr.town || addr.village || addr.county;

        if (place)             candidates.push({ label: '施設名',       name: place });
        if (place && road)     candidates.push({ label: '施設＋通り',    name: `${place}（${road}）` });
        if (road && city)      candidates.push({ label: 'エリア',        name: `${road}、${area || city}` });
        if (city)              candidates.push({ label: '市区町村',      name: area ? `${area}、${city}` : city });

        if (candidates.length === 0) {
            candidates.push({ label: '取得した住所', name: data.display_name?.split(',')[0] || '不明' });
        }

        // モーダル表示
        const container = document.getElementById('locCandidates');
        container.innerHTML = '';
        candidates.forEach(c => {
            const item = document.createElement('div');
            item.className = 'loc-item';
            item.innerHTML = `<div class="loc-item-label">${c.label}</div><div class="loc-item-name">${c.name}</div>`;
            item.addEventListener('click', () => {
                const input = document.getElementById('textInput');
                const sep   = input.value.trim() ? ' ' : '';
                input.value += sep + c.name;
                input.style.height = 'auto';
                input.style.height = Math.min(input.scrollHeight, 110) + 'px';
                document.getElementById('submitBtn').disabled = !input.value.trim();
                closeLocModal();
                input.focus();
            });
            container.appendChild(item);
        });

        locModalOverlay.classList.add('active');

    } catch (err) {
        const msg = err.code === 1 ? '位置情報の許可が必要です' :
                    err.code === 2 ? '位置情報を取得できませんでした' :
                    err.code === 3 ? '位置情報の取得がタイムアウトしました' : '位置情報エラー';
        showError(msg);
    } finally {
        locBtn.classList.remove('loading');
        locBtn.textContent = '📍';
    }
});

// ============================================================
// Edit Modal
// ============================================================
const modalOverlay = document.getElementById('modalOverlay');

function openEditModal(ev, ts) {
    currentEditId = ev.id;
    document.getElementById('editContent').value  = ev.summary || '';
    document.getElementById('editDatetime').value = toDatetimeLocal(ts);
    // 終了時刻をセット（カレンダーに記録済みの値 or フォールバックで+1時間）
    const endTs = ev.end?.dateTime
        ? new Date(ev.end.dateTime).getTime()
        : ts + 60 * 60 * 1000;
    document.getElementById('editEndDatetime').value = toDatetimeLocal(endTs);
    modalOverlay.classList.add('active');
    setTimeout(() => document.getElementById('editContent').focus(), 300);
}

function closeModal() { modalOverlay.classList.remove('active'); currentEditId = null; }

document.getElementById('modalClose').addEventListener('click', closeModal);
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });

document.getElementById('saveBtn').addEventListener('click', async () => {
    const content  = document.getElementById('editContent').value.trim();
    const dtVal    = document.getElementById('editDatetime').value;
    const dtEndVal = document.getElementById('editEndDatetime').value;
    if (!content || !dtVal) return;
    const startTs = new Date(dtVal).getTime();
    let endTs = null;
    if (dtEndVal) {
        endTs = new Date(dtEndVal).getTime();
        if (isNaN(endTs) || endTs <= startTs) {
            showError('終了日時は開始日時より後にしてください'); return;
        }
    }
    try {
        await updateEvent(currentEditId, content, startTs, endTs);
        closeModal();
        await loadEntries();
        showToast('更新しました ✓');
    } catch (e) { showError('更新エラー: ' + e.message); }
});

document.getElementById('deleteBtn').addEventListener('click', async () => {
    if (!confirm('この記録を削除しますか？\n（Googleカレンダーからも削除されます）')) return;
    try {
        await deleteEvent(currentEditId);
        closeModal();
        await loadEntries();
        showToast('削除しました');
    } catch (e) { showError('削除エラー: ' + e.message); }
});

document.getElementById('signoutBtn').addEventListener('click', () => {
    if (confirm('ログアウトしますか？')) {
        google.accounts.oauth2.revoke(accessToken, () => {});
